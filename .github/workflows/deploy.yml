name: Deploy to Azure App Service

# Manual for now. Once the App Service exists and the publish-profile secret is
# set, add `push: { branches: [main] }` here to deploy automatically on merge.
on:
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: firststepreading # <-- change to your App Service name
  NODE_VERSION: 20

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build
      # Slim node_modules to runtime deps (drops vite/eslint/etc.) before deploy.
      - run: npm prune --omit=dev
      - uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
