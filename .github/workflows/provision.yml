name: Provision Azure infrastructure (Bicep)

# Manual: infrastructure changes are deliberate. Run from Actions ▸ Run workflow.
on:
  workflow_dispatch:
    inputs:
      resourceGroup:
        description: Resource group name
        default: firststepreading-rg
        required: true
      location:
        description: Azure region
        default: eastus
        required: true
      appName:
        description: Web App name (must be globally unique)
        default: firststepreading
        required: true

permissions:
  id-token: write # required for OIDC login
  contents: read

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Create resource group
        run: az group create -n "${{ inputs.resourceGroup }}" -l "${{ inputs.location }}"
      - name: Deploy Bicep
        run: |
          az deployment group create \
            -g "${{ inputs.resourceGroup }}" \
            -f infra/main.bicep \
            -p appName="${{ inputs.appName }}"
