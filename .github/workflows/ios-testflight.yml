name: Upload iOS to TestFlight

# Manual-only workflow for App Store Connect/TestFlight uploads.
# Requires the Apple Developer account, app record, and GitHub secrets listed in docs/ios-testflight.md.
on:
  workflow_dispatch:
    inputs:
      marketing_version:
        description: Optional App Store version in x.y.z numeric format. Leave blank to use package.json version.
        required: false
        type: string
      build_number:
        description: Optional iOS build number with 1-3 numeric parts. Leave blank to use GitHub run number and run attempt.
        required: false
        type: string

permissions:
  contents: read

env:
  NODE_VERSION: 22
  IOS_BUNDLE_ID: com.firststepreadingapp.app
  IOS_SCHEME: App
  IOS_PROJECT: ios/App/App.xcodeproj
  IOS_ARCHIVE_PATH: build/FirstStepReading.xcarchive
  IOS_EXPORT_PATH: build/ios-export

jobs:
  upload-testflight:
    name: Build and upload iOS app
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          XCODE_PATH="/Applications/Xcode_26.5.app"
          if [ ! -d "$XCODE_PATH" ]; then
            XCODE_PATH="$(python3 <<'PY'
          from pathlib import Path
          import re

          def version_key(path):
              match = re.search(r"Xcode_(\d+(?:\.\d+)*).*\.app$", path.name)
              if not match:
                  return ()
              return tuple(int(part) for part in match.group(1).split("."))

          paths = [path for path in Path("/Applications").glob("Xcode_26*.app") if path.is_dir()]
          if paths:
              print(max(paths, key=version_key))
          PY
          )"
          fi
          if [ ! -d "$XCODE_PATH" ]; then
            echo "::error::Xcode 26 is required for App Store Connect uploads."
            exit 1
          fi
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Resolve iOS App Store version
        env:
          IOS_MARKETING_VERSION_INPUT: ${{ inputs.marketing_version }}
          IOS_BUILD_NUMBER_INPUT: ${{ inputs.build_number }}
        run: node scripts/resolve-ios-version.mjs

      - run: npm run build

      - name: Validate Apple secrets
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          for secret_name in APPLE_TEAM_ID APP_STORE_CONNECT_ISSUER_ID APP_STORE_CONNECT_KEY_ID APP_STORE_CONNECT_API_KEY; do
            if [ -z "${!secret_name}" ]; then
              echo "::error::Missing GitHub secret: ${secret_name}"
              exit 1
            fi
          done

      - name: Generate or sync iOS project
        run: |
          if [ -d ios ]; then
            npx --no-install cap sync ios
          else
            npx --no-install cap add ios
            npx --no-install cap sync ios
          fi

      - name: Install iOS app icon
        run: node scripts/install-ios-app-icon.mjs

      - name: Write App Store Connect API key
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          mkdir -p "$RUNNER_TEMP/appstoreconnect"
          printf '%s' "$APP_STORE_CONNECT_API_KEY" > "$RUNNER_TEMP/appstoreconnect/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          chmod 600 "$RUNNER_TEMP/appstoreconnect/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"

      - name: Create export options
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Resolve iOS package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$IOS_PROJECT" \
            -scheme "$IOS_SCHEME"

      - name: Archive iOS app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcodebuild archive \
            -project "$IOS_PROJECT" \
            -scheme "$IOS_SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$IOS_ARCHIVE_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/appstoreconnect/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            PRODUCT_BUNDLE_IDENTIFIER="$IOS_BUNDLE_ID" \
            MARKETING_VERSION="$IOS_MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$IOS_BUILD_NUMBER"

      - name: Export signed IPA
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcodebuild -exportArchive \
            -archivePath "$IOS_ARCHIVE_PATH" \
            -exportPath "$IOS_EXPORT_PATH" \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/appstoreconnect/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Normalize IPA name
        run: |
          IPA_PATH="$(find "$IOS_EXPORT_PATH" -name '*.ipa' -type f | head -n 1)"
          if [ -z "$IPA_PATH" ]; then
            echo "::error::No IPA file was exported."
            exit 1
          fi
          mv "$IPA_PATH" "$IOS_EXPORT_PATH/FirstStepReading.ipa"

      - uses: actions/upload-artifact@v4
        with:
          name: firststepreading-ios-ipa
          path: ${{ env.IOS_EXPORT_PATH }}/FirstStepReading.ipa
          if-no-files-found: error
          retention-days: 7

      - name: Upload IPA to TestFlight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ${{ env.IOS_EXPORT_PATH }}/FirstStepReading.ipa
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
